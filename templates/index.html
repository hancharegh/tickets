<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Театр — Выбор мест</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Spectral:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d14; --surface:#13131f; --gold:#c9a84c; --gold-dim:#8a6f30;
    --text:#e8e0d0; --muted:#7a7060;
    --sf:#2a2a3e; --sfb:#4a4a6e;
    --st:#3d1515; --stb:#8b2020;
    --su:#1a2e1a; --sub:#2a4a2a;
    --sh:#3d3520; --ss:#5c4a10; --ssb:#c9a84c;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Spectral',serif;min-height:100vh;}

  header{text-align:center;padding:2rem 1rem 1.2rem;border-bottom:1px solid #2a2a3a;position:relative;}
  header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,#1e1830,transparent 70%);pointer-events:none;}
  header h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.6rem);font-weight:900;color:var(--gold);text-shadow:0 0 40px rgba(201,168,76,.3);}
  header p{margin-top:.4rem;color:var(--muted);font-style:italic;font-size:.9rem;letter-spacing:.06em;}

  .legend{display:flex;flex-wrap:wrap;gap:.6rem 1.4rem;justify-content:center;padding:1rem;border-bottom:1px solid #1f1f2e;font-size:.78rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
  .legend-item{display:flex;align-items:center;gap:.4rem;}
  .ld{width:13px;height:12px;border-radius:2px;}
  .ld-f{background:var(--sf);border:1px solid var(--sfb);}
  .ld-t{background:var(--st);border:1px solid var(--stb);}
  .ld-s{background:var(--ss);border:1px solid var(--ssb);}

  .stage-wrap{display:flex;justify-content:center;padding:1.5rem 1rem .3rem;}
  .stage{width:min(500px,80vw);height:34px;background:linear-gradient(180deg,#3a2e10,#1e1808);border:1px solid var(--gold-dim);border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.8rem;letter-spacing:.25em;color:var(--gold);text-transform:uppercase;box-shadow:0 -4px 24px rgba(201,168,76,.1);}

  /* hall scroll */
  .hall-outer{overflow-x:auto;padding:.5rem 1rem 1rem;display:flex;justify-content:flex-start;}
  .hall-inner{display:flex;gap:10px;align-items:flex-start;padding:8px 4px;}

  /* lozha blocks */
  .lozha-block{display:flex;flex-direction:column;gap:2px;align-items:center;}
  .lozha-title{font-size:.6rem;color:var(--gold-dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px;text-align:center;white-space:nowrap;}
  .lozha-sep{height:8px;}

  /* parterre */
  .parterre{display:flex;flex-direction:column;gap:2px;}
  .p-row{display:flex;align-items:center;gap:1px;}
  .rl{font-size:.55rem;color:var(--muted);width:32px;text-align:right;padding-right:4px;flex-shrink:0;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .rl-r{font-size:.55rem;color:var(--muted);width:32px;text-align:left;padding-left:4px;flex-shrink:0;}
  .aisle{width:10px;flex-shrink:0;}
  .aisle-sm{width:5px;flex-shrink:0;}

  /* right partner */
  .partner-block{display:flex;flex-direction:column;gap:2px;align-items:center;}
  .partner-sep{height:8px;}

  /* seat */
  .seat{width:16px;height:14px;border-radius:3px 3px 2px 2px;border:1px solid var(--sfb);background:var(--sf);cursor:pointer;flex-shrink:0;transition:transform .1s,background .12s,border-color .12s,box-shadow .12s;position:relative;}
  .seat::after{content:'';position:absolute;top:0;left:10%;right:10%;height:3px;background:rgba(255,255,255,.06);border-radius:2px 2px 0 0;}
  .seat:hover{background:var(--sh);border-color:var(--gold-dim);transform:scaleY(1.1);z-index:2;box-shadow:0 0 5px rgba(201,168,76,.2);}
  .seat.taken{background:var(--st);border-color:var(--stb);cursor:not-allowed;}
  .seat.taken:hover{transform:none;box-shadow:none;}
  .seat.used{background:var(--su);border-color:var(--sub);cursor:not-allowed;opacity:.55;}
  .seat.used:hover{transform:none;box-shadow:none;}
  .seat.selected{background:var(--ss);border-color:var(--ssb);box-shadow:0 0 8px rgba(201,168,76,.5);transform:scaleY(1.15);z-index:3;}

  /* info bar */
  .info-bar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid #2a2a3a;padding:.9rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;z-index:100;box-shadow:0 -6px 28px rgba(0,0,0,.5);}
  .sel-info{flex:1;font-size:.88rem;color:var(--muted);}
  .sel-info strong{color:var(--gold);font-style:italic;}
  .btn-book{background:linear-gradient(135deg,#c9a84c,#8a6f30);color:#0d0d14;border:none;border-radius:5px;padding:.65rem 1.8rem;font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:opacity .2s,transform .1s;}
  .btn-book:hover:not(:disabled){opacity:.85;transform:scale(1.02);}
  .btn-book:disabled{opacity:.3;cursor:not-allowed;}

  /* modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);}
  .modal-bg.open{display:flex;}
  .modal{background:var(--surface);border:1px solid #2e2e45;border-radius:10px;padding:1.8rem;width:100%;max-width:390px;position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);animation:slideUp .22s ease;}
  @keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal h2{font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--gold);margin-bottom:1.1rem;}
  .seat-summary{background:#0d0d14;border-radius:6px;padding:.7rem 1rem;margin-bottom:1.1rem;font-size:.86rem;color:var(--muted);line-height:1.7;}
  .seat-summary strong{color:var(--text);}
  .modal label{display:block;font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem;}
  .modal input[type=text]{width:100%;background:#0d0d14;border:1px solid #2e2e45;border-radius:5px;padding:.6rem .85rem;color:var(--text);font-family:'Spectral',serif;font-size:.95rem;outline:none;transition:border-color .2s;}
  .modal input:focus{border-color:var(--gold-dim);}
  .modal-actions{display:flex;gap:.7rem;margin-top:1.4rem;}
  .btn-cancel{flex:1;padding:.62rem;background:transparent;border:1px solid #2e2e45;border-radius:5px;color:var(--muted);font-family:'Spectral',serif;font-size:.9rem;cursor:pointer;transition:border-color .2s;}
  .btn-cancel:hover{border-color:#4a4a6e;}
  .btn-confirm{flex:2;padding:.62rem;background:linear-gradient(135deg,#c9a84c,#8a6f30);border:none;border-radius:5px;color:#0d0d14;font-family:'Playfair Display',serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:opacity .2s;}
  .btn-confirm:hover{opacity:.85;}
  .btn-confirm:disabled{opacity:.4;cursor:not-allowed;}
  .modal-close{position:absolute;top:.75rem;right:.85rem;background:none;border:none;color:var(--muted);font-size:1.15rem;cursor:pointer;}

  /* qr modal */
  .qr-wrap{text-align:center;}
  .qr-wrap h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);margin-bottom:.35rem;}
  .qr-subtitle{color:var(--muted);font-size:.82rem;margin-bottom:1.1rem;}
  .qr-wrap img{width:190px;height:190px;border-radius:8px;border:3px solid var(--gold-dim);display:block;margin:0 auto 1.1rem;}
  .qr-ticket-info{background:#0d0d14;border-radius:6px;padding:.7rem 1rem;font-size:.85rem;line-height:1.8;color:var(--muted);text-align:left;margin-bottom:1rem;}
  .qr-ticket-info strong{color:var(--text);}
  .qr-note{font-size:.72rem;color:var(--muted);font-style:italic;}
  .btn-done{width:100%;margin-top:.9rem;padding:.68rem;background:linear-gradient(135deg,#c9a84c,#8a6f30);border:none;border-radius:5px;color:#0d0d14;font-family:'Playfair Display',serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:opacity .2s;}
  .btn-done:hover{opacity:.85;}

  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(201,168,76,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:.4rem;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <h1>Схема зала</h1>
  <p>Выберите место для бронирования билета</p>
</header>

<div class="legend">
  <span class="legend-item"><span class="ld ld-f"></span>Свободно</span>
  <span class="legend-item"><span class="ld ld-t"></span>Занято</span>
  <span class="legend-item"><span class="ld ld-s"></span>Выбрано</span>
</div>

<div class="stage-wrap"><div class="stage">Сцена</div></div>

<div class="hall-outer">
  <div class="hall-inner" id="hall"></div>
</div>

<div class="info-bar">
  <div class="sel-info" id="selInfo">Место не выбрано</div>
  <button class="btn-book" id="btnBook" disabled onclick="openBookingModal()">Забронировать</button>
</div>

<!-- Booking modal -->
<div class="modal-bg" id="modalBook">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modalBook')">✕</button>
    <h2>Оформление билета</h2>
    <div class="seat-summary" id="bookSummary"></div>
    <label>Ваше имя</label>
    <input type="text" id="guestName" placeholder="Иванов Иван" maxlength="60">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modalBook')">Отмена</button>
      <button class="btn-confirm" id="btnConfirm" onclick="confirmBooking()">Получить QR</button>
    </div>
  </div>
</div>

<!-- QR modal -->
<div class="modal-bg" id="modalQR">
  <div class="modal">
    <div class="qr-wrap">
      <h2>Ваш билет</h2>
      <p class="qr-subtitle">Предъявите QR-код при входе в зал</p>
      <img id="qrImg" src="" alt="QR билет">
      <div class="qr-ticket-info" id="qrInfo"></div>
      <p class="qr-note">⚠️ QR-код одноразовый — аннулируется после сканирования</p>
      <button class="btn-done" onclick="closeDone()">Готово</button>
    </div>
  </div>
</div>

<script>
// ── Точная схема зала по данным ──────────────────────────────────────────
//
// ПАРТЕР (ряды 1–19, нумерация снизу вверх = от сцены):
//   Ряды 1–5:   места 1–22, промежуток после 11
//   Ряды 6–14:  места 1–24, сплошной (промежуток после 12)
//   Ряды 15–19: места 1–24, промежуток после 12 (маленький)
//
// ЛОЖА А (снизу-слева): 2 ряда × 4 места (ряд 1: места 1-4, ряд 2: места 5-8)
// ЛОЖА Б (сверху-слева): аналогично
//
// ПРАВЫЙ ПАРТЕР:
//   Нижний блок (партер 1с): 20 рядов × 1 место (места 1–12, 12с)
//   Верхний блок (партер 13с): 20 рядов × 1 место (места 13–24, 22с, 24с)

const ROWS = [
  // {r: номер_ряда, seats: кол-во, aisleAfter: после какого места промежуток}
  {r:1,  seats:22, aisleAfter:11},
  {r:2,  seats:22, aisleAfter:11},
  {r:3,  seats:22, aisleAfter:11},
  {r:4,  seats:22, aisleAfter:11},
  {r:5,  seats:22, aisleAfter:11},
  {r:6,  seats:24, aisleAfter:12},
  {r:7,  seats:24, aisleAfter:12},
  {r:8,  seats:24, aisleAfter:12},
  {r:9,  seats:24, aisleAfter:12},
  {r:10, seats:24, aisleAfter:12},
  {r:11, seats:24, aisleAfter:12},
  {r:12, seats:24, aisleAfter:12},
  {r:13, seats:24, aisleAfter:12},
  {r:14, seats:24, aisleAfter:12},
  {r:15, seats:24, aisleAfter:12, smallAisle:true},
  {r:16, seats:24, aisleAfter:12, smallAisle:true},
  {r:17, seats:24, aisleAfter:12, smallAisle:true},
  {r:18, seats:24, aisleAfter:12, smallAisle:true},
  {r:19, seats:24, aisleAfter:12, smallAisle:true},
];

// Ложи: 2 ряда по 4 места
const LOZHA_ROWS = 2;
const LOZHA_SEATS_PER_ROW = 4;

// Правый партер: 20 рядов, 2 колонки (нижняя: 1-12, верхняя: 13-24)
const PARTNER_ROWS = 20;

let selectedSeat = null;
let bookedMap = {};

function buildHall(booked) {
  bookedMap = {};
  booked.forEach(b => { bookedMap[b.seat_id] = b; });

  const hall = document.getElementById('hall');
  hall.innerHTML = '';

  // ── Ложи (левый блок) ──
  const lozhaBlock = document.createElement('div');
  lozhaBlock.className = 'lozha-block';

  // Ложа Б (верх)
  const lbTitle = document.createElement('div');
  lbTitle.className = 'lozha-title';
  lbTitle.textContent = 'Ложа Б';
  lozhaBlock.appendChild(lbTitle);

  for (let row = LOZHA_ROWS; row >= 1; row--) {
    const rowEl = document.createElement('div');
    rowEl.style.cssText = 'display:flex;gap:2px;';
    for (let s = 1; s <= LOZHA_SEATS_PER_ROW; s++) {
      const seatNum = (row - 1) * LOZHA_SEATS_PER_ROW + s;
      rowEl.appendChild(makeSeat('Ложа_Б', row, seatNum));
    }
    lozhaBlock.appendChild(rowEl);
  }

  const sep = document.createElement('div');
  sep.className = 'lozha-sep';
  // small label
  const midLabel = document.createElement('div');
  midLabel.style.cssText = 'height:16px;';
  lozhaBlock.appendChild(sep);
  lozhaBlock.appendChild(midLabel);

  // Ложа А (низ)
  const laTitle = document.createElement('div');
  laTitle.className = 'lozha-title';
  laTitle.textContent = 'Ложа А';
  lozhaBlock.appendChild(laTitle);

  for (let row = LOZHA_ROWS; row >= 1; row--) {
    const rowEl = document.createElement('div');
    rowEl.style.cssText = 'display:flex;gap:2px;';
    for (let s = 1; s <= LOZHA_SEATS_PER_ROW; s++) {
      const seatNum = (row - 1) * LOZHA_SEATS_PER_ROW + s;
      rowEl.appendChild(makeSeat('Ложа_А', row, seatNum));
    }
    lozhaBlock.appendChild(rowEl);
  }

  hall.appendChild(lozhaBlock);

  // ── Партер (центр) ──
  const parterre = document.createElement('div');
  parterre.className = 'parterre';

  // Строим сверху вниз (ряд 19 первый — дальше от сцены)
  for (let i = ROWS.length - 1; i >= 0; i--) {
    const cfg = ROWS[i];
    const rowEl = document.createElement('div');
    rowEl.className = 'p-row';

    // Левый лейбл
    const lbl = document.createElement('span');
    lbl.className = 'rl';
    lbl.textContent = cfg.r + ' ряд';
    rowEl.appendChild(lbl);

    for (let s = 1; s <= cfg.seats; s++) {
      if (s === cfg.aisleAfter + 1) {
        const aisle = document.createElement('div');
        aisle.className = cfg.smallAisle ? 'aisle-sm' : 'aisle';
        rowEl.appendChild(aisle);
      }
      rowEl.appendChild(makeSeat('Партер', cfg.r, s));
    }

    // Правый лейбл
    const lblR = document.createElement('span');
    lblR.className = 'rl-r';
    lblR.textContent = cfg.r + ' ряд';
    rowEl.appendChild(lblR);

    parterre.appendChild(rowEl);
  }
  hall.appendChild(parterre);

  // ── Правый партер ──
  const partnerBlock = document.createElement('div');
  partnerBlock.className = 'partner-block';

  // Верхний блок: места 13-24 (сверху на схеме)
  const ptTopTitle = document.createElement('div');
  ptTopTitle.className = 'lozha-title';
  ptTopTitle.textContent = 'Партер 13с–24с';
  partnerBlock.appendChild(ptTopTitle);

  for (let row = PARTNER_ROWS; row >= 1; row--) {
    const rowEl = document.createElement('div');
    rowEl.style.cssText = 'display:flex;gap:2px;';
    rowEl.appendChild(makeSeat('Партер_правый_верх', row, row));
    partnerBlock.appendChild(rowEl);
  }

  const pSep = document.createElement('div');
  pSep.className = 'partner-sep';
  partnerBlock.appendChild(pSep);

  // Нижний блок: места 1-12
  const ptBotTitle = document.createElement('div');
  ptBotTitle.className = 'lozha-title';
  ptBotTitle.textContent = 'Партер 1с–12с';
  partnerBlock.appendChild(ptBotTitle);

  for (let row = PARTNER_ROWS; row >= 1; row--) {
    const rowEl = document.createElement('div');
    rowEl.style.cssText = 'display:flex;gap:2px;';
    rowEl.appendChild(makeSeat('Партер_правый_низ', row, row));
    partnerBlock.appendChild(rowEl);
  }

  hall.appendChild(partnerBlock);
}

function makeSeat(section, row, seat) {
  const seatId = `${section}_r${row}_s${seat}`;
  const el = document.createElement('div');
  el.className = 'seat';
  el.dataset.id      = seatId;
  el.dataset.section = section.replace(/_/g, ' ');
  el.dataset.row     = row;
  el.dataset.seat    = seat;
  el.title = `${section.replace(/_/g,' ')}, ряд ${row}, место ${seat}`;

  if (bookedMap[seatId]) {
    const b = bookedMap[seatId];
    el.classList.add(b.used ? 'used' : 'taken');
    el.title += b.used ? ` — использован` : ` — занято (${b.guest_name})`;
  } else {
    el.addEventListener('click', () => selectSeat(el));
  }
  return el;
}

function selectSeat(el) {
  document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
  selectedSeat = {
    id:      el.dataset.id,
    section: el.dataset.section,
    row:     parseInt(el.dataset.row),
    seat:    parseInt(el.dataset.seat),
  };
  el.classList.add('selected');
  document.getElementById('selInfo').innerHTML =
    `Выбрано: <strong>${selectedSeat.section}, ряд ${selectedSeat.row}, место ${selectedSeat.seat}</strong>`;
  document.getElementById('btnBook').disabled = false;
}

function openBookingModal() {
  if (!selectedSeat) return;
  document.getElementById('bookSummary').innerHTML =
    `<strong>${selectedSeat.section}</strong><br>Ряд: <strong>${selectedSeat.row}</strong> &nbsp;·&nbsp; Место: <strong>${selectedSeat.seat}</strong>`;
  document.getElementById('guestName').value = '';
  document.getElementById('modalBook').classList.add('open');
  setTimeout(() => document.getElementById('guestName').focus(), 100);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function closeDone() {
  closeModal('modalQR');
  loadSeats();
  selectedSeat = null;
  document.getElementById('selInfo').textContent = 'Место не выбрано';
  document.getElementById('btnBook').disabled = true;
}

async function confirmBooking() {
  const name = document.getElementById('guestName').value.trim();
  if (!name) { document.getElementById('guestName').focus(); return; }
  const btn = document.getElementById('btnConfirm');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Создание…';
  try {
    const resp = await fetch('/api/book', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        seat_id:    selectedSeat.id,
        row_num:    selectedSeat.row,
        seat_num:   selectedSeat.seat,
        section:    selectedSeat.section,
        guest_name: name,
      })
    });
    if (resp.status === 409) {
      alert('Это место только что заняли. Выберите другое.');
      closeModal('modalBook');
      loadSeats();
      return;
    }
    const data = await resp.json();
    closeModal('modalBook');
    showQR(data);
  } catch(e) {
    alert('Ошибка сети. Проверьте соединение и попробуйте ещё раз.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Получить QR';
  }
}

function showQR(data) {
  document.getElementById('qrImg').src = 'data:image/png;base64,' + data.qr_base64;
  document.getElementById('qrInfo').innerHTML =
    `<strong>${data.guest_name}</strong><br>` +
    `${data.section} · ряд ${data.row_num} · место ${data.seat_num}<br>` +
    `<small style="font-size:.72rem;opacity:.6;">ID: ${data.ticket_id}</small>`;
  document.getElementById('modalQR').classList.add('open');
}

async function loadSeats() {
  try {
    const resp = await fetch('/api/seats');
    const data = await resp.json();
    buildHall(data.booked);
  } catch(e) {
    buildHall([]);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('guestName').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmBooking();
  });
  loadSeats();
  setInterval(loadSeats, 30000);
});
</script>
</body>
</html>
